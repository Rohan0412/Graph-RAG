cache:
  base_dir: cache
  type: file
chunks:
  group_by_columns:
  - source
  overlap: 150
  size: 1500
community_summarization:
  max_length: 3000
  strategy:
    type: graph_intelligence
embeddings:
  api_base: https://rohan-mfs2dn0d-northcentralus.cognitiveservices.azure.com
  api_key: ${AZURE_OPENAI_KEY}
  api_version: 2024-12-01-preview
  concurrent_requests: 5
  deployment_name: text-embedding-3-large
  max_retries: 10
  max_retry_wait: 10.0
  max_tokens: 8192
  model: text-embedding-3-large
  request_timeout: 60.0
  sleep_on_rate_limit_recommendation: true
  type: azure_openai_embedding
encoding_model: cl100k_base
entity_extraction:
  entity_types:
  - PERSON
  - ORGANIZATION
  - LOCATION
  - EVENT
  - CONCEPT
  - TECHNOLOGY
  - PRODUCT
  - DATE
  max_gleanings: 2
  strategy:
    type: graph_intelligence
input:
  base_dir: input
  file_encoding: utf-8
  file_pattern: .*\.txt$
  file_type: text
  type: file
llm:
  api_base: https://rohan-mfs2dn0d-northcentralus.cognitiveservices.azure.com
  api_key: ${AZURE_OPENAI_KEY}
  api_version: 2024-12-01-preview
  concurrent_requests: 3
  deployment_name: gpt-4o
  max_retries: 10
  max_retry_wait: 10.0
  max_tokens: 4000
  model: gpt-4o
  model_supports_json: true
  request_timeout: 180.0
  sleep_on_rate_limit_recommendation: true
  temperature: 0.1
  top_p: 1.0
  type: azure_openai_chat
reporting:
  base_dir: output
  type: file
skip_workflows: []
snapshots:
  graphml: true
  raw_entities: true
  top_level_nodes: true
storage:
  type: file
